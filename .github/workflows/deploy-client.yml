name: Deploy Client Site

on:
  push:
    branches:
      - 'client/**'

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  resolve-project:
    runs-on: ubuntu-latest
    outputs:
      project_id: ${{ steps.resolve.outputs.project_id }}
      is_production: ${{ steps.resolve.outputs.is_production }}
      client_slug: ${{ steps.resolve.outputs.client_slug }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Vercel project from client.json
        id: resolve
        run: |
          CLIENT_ID=$(node -e "console.log(JSON.parse(require('fs').readFileSync('src/data/client.json','utf8')).clientId)")
          PROJECT_ID=$(node -e "console.log(JSON.parse(require('fs').readFileSync('src/data/client.json','utf8')).deploy?.projectId || '')")
          IS_CONCEPT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('src/data/client.json','utf8')).isConcept)")

          if [ -z "$PROJECT_ID" ] || [ "$PROJECT_ID" = "null" ]; then
            echo "Error: No Vercel project ID found in client.json. Run deploy setup first."
            exit 1
          fi

          if [ "$IS_CONCEPT" = "true" ]; then
            echo "is_production=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_production=true" >> "$GITHUB_OUTPUT"
          fi

          echo "project_id=$PROJECT_ID" >> "$GITHUB_OUTPUT"
          echo "client_slug=$CLIENT_ID" >> "$GITHUB_OUTPUT"

  deploy:
    needs: resolve-project
    runs-on: ubuntu-latest
    env:
      VERCEL_PROJECT_ID: ${{ needs.resolve-project.outputs.project_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=${{ needs.resolve-project.outputs.is_production == 'true' && 'production' || 'preview' }} --token=${{ env.VERCEL_TOKEN }}

      - name: Build
        run: vercel build ${{ needs.resolve-project.outputs.is_production == 'true' && '--prod' || '' }} --token=${{ env.VERCEL_TOKEN }}

      - name: Deploy
        id: deploy
        run: |
          if [ "${{ needs.resolve-project.outputs.is_production }}" = "true" ]; then
            URL=$(vercel deploy --prebuilt --prod --token=${{ env.VERCEL_TOKEN }})
          else
            URL=$(vercel deploy --prebuilt --token=${{ env.VERCEL_TOKEN }})
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $URL"

      - name: Comment on commit
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const client = '${{ needs.resolve-project.outputs.client_slug }}';
            const isProd = '${{ needs.resolve-project.outputs.is_production }}' === 'true';
            const label = isProd ? 'Production' : 'Preview';
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `**${label} Deploy** for ${client}: ${url}`
            });
